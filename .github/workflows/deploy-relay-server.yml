name: Relay Server Deploy

on:
  push:
    branches:
      - main
    paths:
      - apps/relay-server/**
      - packages/cli-helper/**
      - packages/tsconfigs/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .node-version
      - .github/workflows/deploy-relay-server.yml
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: relay-server-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: deploy-relay-server
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Relay server deployment artifact
        run: pnpm -C apps/relay-server build:vercel

      - name: Run Relay live smoke against built Admin assets
        run: pnpm tools relay-config live-smoke --json --skip-admin-build

      - name: Upload Relay server artifact
        uses: actions/upload-artifact@v4
        with:
          name: relay-server-vercel-artifact
          path: |
            apps/relay-server/dist
            apps/relay-server/public
          if-no-files-found: error

      - name: Trigger Relay server deployment
        env:
          GH_TOKEN: ${{ secrets.RELAY_SERVER_DEPLOY_TOKEN }}
          RELAY_SERVER_DEPLOY_REPOSITORY: ${{ vars.RELAY_SERVER_DEPLOY_REPOSITORY }}
          RELAY_SERVER_DEPLOY_WORKFLOW: ${{ vars.RELAY_SERVER_DEPLOY_WORKFLOW }}
          SOURCE_REF: main
          SOURCE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN}" ] || [ -z "${RELAY_SERVER_DEPLOY_REPOSITORY}" ] || [ -z "${RELAY_SERVER_DEPLOY_WORKFLOW}" ]; then
            echo "::notice::Relay server deployment target is not configured; build artifact and smoke passed."
            exit 0
          fi

          run_url="$(gh workflow run "${RELAY_SERVER_DEPLOY_WORKFLOW}" \
            --repo "${RELAY_SERVER_DEPLOY_REPOSITORY}" \
            --ref main \
            -f source_ref="${SOURCE_REF}" \
            -f source_sha="${SOURCE_SHA}")"

          echo "$run_url"
          run_id="${run_url##*/}"
          if [ -z "$run_id" ] || [ "$run_id" = "$run_url" ]; then
            echo "Unable to resolve Relay server workflow run id from: $run_url" >&2
            exit 1
          fi

          gh run watch "$run_id" \
            --repo "${RELAY_SERVER_DEPLOY_REPOSITORY}" \
            --exit-status \
            --interval 10
