name: VS Code Extension CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths:
      - .github/workflows/vscode-extension-ci.yml
      - .github/workflows/vscode-extension-release.yml
      - apps/vscode-extension/**
      - package.json
      - packages/tsconfigs/**
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: vscode-extension-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: vscode-extension-changes
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.filter.outputs.build }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check VS Code extension paths
        id: filter
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi

          if [[ -z "$base" || "$base" =~ ^0+$ ]] || ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            echo "build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git diff --name-only --diff-filter=ACMRT "$base" "$head" > "$RUNNER_TEMP/vscode-extension-changes.txt"

          build=false
          while IFS= read -r file_path; do
            case "$file_path" in
              .github/workflows/vscode-extension-ci.yml|.github/workflows/vscode-extension-release.yml|apps/vscode-extension/*|package.json|packages/tsconfigs/*|pnpm-lock.yaml|pnpm-workspace.yaml)
                build=true
                break
                ;;
            esac
          done < "$RUNNER_TEMP/vscode-extension-changes.txt"

          echo "build=$build" >> "$GITHUB_OUTPUT"

  build:
    name: VS Code extension
    needs: changes
    if: needs.changes.outputs.build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Read extension version
        id: version
        run: |
          VERSION=$(node -p "JSON.parse(require('fs').readFileSync('apps/vscode-extension/package.json', 'utf8')).version")
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "file=oneworks-vscode-extension-v$VERSION.vsix" >> "$GITHUB_OUTPUT"
          echo "archive=apps/vscode-extension/oneworks-vscode-extension-v$VERSION.vsix" >> "$GITHUB_OUTPUT"

      - name: Typecheck extension
        run: pnpm --filter @oneworks/vscode-extension typecheck

      - name: Build extension
        run: pnpm --filter @oneworks/vscode-extension build

      - name: Package VSIX
        env:
          ARCHIVE_FILE: ${{ steps.version.outputs.file }}
          VSCODE_EXTENSION_PUBLISHER: oneworks-ai
        run: pnpm --filter @oneworks/vscode-extension package:vsix -- --out "$ARCHIVE_FILE"

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: oneworks-vscode-extension-v${{ steps.version.outputs.value }}
          path: ${{ steps.version.outputs.archive }}
          if-no-files-found: error
          retention-days: 14
