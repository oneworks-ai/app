name: Trigger PWA Deploy

on:
  push:
    branches:
      - main
    paths:
      - apps/client/**
      - packages/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .node-version
      - .github/workflows/deploy-pwa.yml
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: trigger-pwa-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trigger:
    name: trigger-pwa-repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Trigger pwa repository deployment
        env:
          GH_TOKEN: ${{ secrets.PWA_DEPLOY_TOKEN }}
          SOURCE_REF: main
          SOURCE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN}" ]; then
            echo "Missing PWA_DEPLOY_TOKEN secret; cannot trigger cross-repository PWA deployment." >&2
            exit 1
          fi

          run_url="$(gh workflow run deploy-pwa.yml \
            --repo oneworks-ai/pwa \
            --ref main \
            -f source_ref="${SOURCE_REF}" \
            -f source_sha="${SOURCE_SHA}")"

          echo "$run_url"
          run_id="${run_url##*/}"
          if [ -z "$run_id" ] || [ "$run_id" = "$run_url" ]; then
            echo "Unable to resolve PWA workflow run id from: $run_url" >&2
            exit 1
          fi

          gh run watch "$run_id" \
            --repo oneworks-ai/pwa \
            --exit-status \
            --interval 10
