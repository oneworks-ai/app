name: IDEA Plugin Release

on:
  push:
    tags:
      - "pkg/oneworks-idea-plugin/v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to package. Must start with pkg/oneworks-idea-plugin/v.
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  IDEA_PLUGIN_RELEASE_TAG_PREFIX: pkg/oneworks-idea-plugin/v

concurrency:
  group: idea-plugin-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      archive_file: oneworks-idea-plugin-${{ steps.version.outputs.value }}.zip
      artifact_name: oneworks-idea-plugin-v${{ steps.version.outputs.value }}
      version: ${{ steps.version.outputs.value }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.0.0

      - name: Validate release version
        id: version
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release_tag || '' }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG_NAME="${INPUT_RELEASE_TAG:-$REF_NAME}"
          PACKAGE_VERSION=$(node -p "JSON.parse(require('fs').readFileSync('apps/idea-plugin/package.json', 'utf8')).version")
          case "$TAG_NAME" in
            ${IDEA_PLUGIN_RELEASE_TAG_PREFIX}*) ;;
            *)
              echo "IDEA plugin release tags must start with ${IDEA_PLUGIN_RELEASE_TAG_PREFIX}." >&2
              exit 1
              ;;
          esac
          TAG_VERSION="${TAG_NAME#${IDEA_PLUGIN_RELEASE_TAG_PREFIX}}"

          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match IDEA plugin version ($PACKAGE_VERSION)." >&2
            exit 1
          fi

          echo "value=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "archive=apps/idea-plugin/build/distributions/oneworks-idea-plugin-$PACKAGE_VERSION.zip" >> "$GITHUB_OUTPUT"

      - name: Build and verify plugin
        run: gradle -p apps/idea-plugin --no-daemon -Dorg.gradle.vfs.watch=false buildPlugin verifyPluginStructure

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: oneworks-idea-plugin-v${{ steps.version.outputs.value }}
          path: ${{ steps.version.outputs.archive }}
          if-no-files-found: error
          retention-days: 14

  release:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download packaged plugin
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: dist

      - name: Create or update GitHub Release
        env:
          ARCHIVE_PATH: dist/${{ needs.build.outputs.archive_file }}
          GH_TOKEN: ${{ github.token }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag || '' }}
          REF_NAME: ${{ github.ref_name }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          TAG_NAME="${INPUT_RELEASE_TAG:-$REF_NAME}"
          release_flags=(--latest=false)
          if [[ "$VERSION" == *-* ]]; then
            release_flags+=(--prerelease)
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$ARCHIVE_PATH" --clobber
            gh release edit "$TAG_NAME" \
              --title "IDEA Plugin v$VERSION" \
              --notes "Packaged IDEA plugin build for v$VERSION." \
              "${release_flags[@]}"
          else
            gh release create "$TAG_NAME" "$ARCHIVE_PATH" \
              --title "IDEA Plugin v$VERSION" \
              --notes "Packaged IDEA plugin build for v$VERSION." \
              "${release_flags[@]}"
          fi
