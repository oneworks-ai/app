name: VS Code Extension Release

on:
  push:
    tags:
      - "pkg/oneworks-vscode-extension/v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to package. Must start with pkg/oneworks-vscode-extension/v.
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  VSCODE_EXTENSION_RELEASE_TAG_PREFIX: pkg/oneworks-vscode-extension/v

concurrency:
  group: vscode-extension-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      archive_file: oneworks-vscode-extension-v${{ steps.version.outputs.value }}.vsix
      artifact_name: oneworks-vscode-extension-v${{ steps.version.outputs.value }}
      publisher: ${{ steps.version.outputs.publisher }}
      version: ${{ steps.version.outputs.value }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release version
        id: version
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release_tag || '' }}
          REF_NAME: ${{ github.ref_name }}
          VSCODE_EXTENSION_PUBLISHER: ${{ vars.VSCODE_EXTENSION_PUBLISHER }}
        run: |
          TAG_NAME="${INPUT_RELEASE_TAG:-$REF_NAME}"
          PACKAGE_VERSION=$(node -p "JSON.parse(require('fs').readFileSync('apps/vscode-extension/package.json', 'utf8')).version")
          case "$TAG_NAME" in
            ${VSCODE_EXTENSION_RELEASE_TAG_PREFIX}*) ;;
            *)
              echo "VS Code extension release tags must start with ${VSCODE_EXTENSION_RELEASE_TAG_PREFIX}." >&2
              exit 1
              ;;
          esac
          TAG_VERSION="${TAG_NAME#${VSCODE_EXTENSION_RELEASE_TAG_PREFIX}}"
          PUBLISHER="${VSCODE_EXTENSION_PUBLISHER:-oneworks-ai}"

          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match VS Code extension version ($PACKAGE_VERSION)." >&2
            exit 1
          fi

          echo "value=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "file=oneworks-vscode-extension-v$PACKAGE_VERSION.vsix" >> "$GITHUB_OUTPUT"
          echo "archive=apps/vscode-extension/oneworks-vscode-extension-v$PACKAGE_VERSION.vsix" >> "$GITHUB_OUTPUT"
          echo "publisher=$PUBLISHER" >> "$GITHUB_OUTPUT"

      - name: Typecheck extension
        run: pnpm --filter @oneworks/vscode-extension typecheck

      - name: Build extension
        run: pnpm --filter @oneworks/vscode-extension build

      - name: Package VSIX
        env:
          ARCHIVE_FILE: ${{ steps.version.outputs.file }}
          VSCODE_EXTENSION_PUBLISHER: ${{ steps.version.outputs.publisher }}
        run: pnpm --filter @oneworks/vscode-extension package:vsix -- --out "$ARCHIVE_FILE"

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: oneworks-vscode-extension-v${{ steps.version.outputs.value }}
          path: ${{ steps.version.outputs.archive }}
          if-no-files-found: error
          retention-days: 14

  release:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download packaged extension
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: dist

      - name: Publish to VS Code Marketplace
        id: vscode_marketplace
        continue-on-error: true
        env:
          ARCHIVE_FILE: ${{ github.workspace }}/dist/${{ needs.build.outputs.archive_file }}
          VSCODE_EXTENSION_PUBLISHER: ${{ vars.VSCODE_EXTENSION_PUBLISHER }}
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCODE_EXTENSION_PUBLISHER" ] || [ -z "$VSCE_PAT" ]; then
            echo "Skipping VS Code Marketplace publish because VSCODE_EXTENSION_PUBLISHER or VSCE_PAT is not configured."
            exit 0
          fi

          pnpm --filter @oneworks/vscode-extension publish:vsix -- --packagePath "$ARCHIVE_FILE"

      - name: Publish to Open VSX Registry
        env:
          ARCHIVE_FILE: ${{ github.workspace }}/dist/${{ needs.build.outputs.archive_file }}
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
          PUBLISHER: ${{ needs.build.outputs.publisher }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          if [ -z "$OVSX_PAT" ]; then
            echo "Skipping Open VSX publish because OVSX_PAT is not configured."
            exit 0
          fi

          pnpm dlx ovsx@1.0.1 verify-pat "$PUBLISHER" -p "$OVSX_PAT"

          publish_args=(publish --skip-duplicate)
          if [[ "$VERSION" == *-* ]]; then
            publish_args+=(--pre-release)
          fi
          publish_args+=("$ARCHIVE_FILE")

          pnpm dlx ovsx@1.0.1 "${publish_args[@]}" -p "$OVSX_PAT"

      - name: Create or update GitHub Release
        env:
          ARCHIVE_PATH: dist/${{ needs.build.outputs.archive_file }}
          GH_TOKEN: ${{ github.token }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag || '' }}
          REF_NAME: ${{ github.ref_name }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          TAG_NAME="${INPUT_RELEASE_TAG:-$REF_NAME}"
          release_flags=(--latest=false)
          if [[ "$VERSION" == *-* ]]; then
            release_flags+=(--prerelease)
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$ARCHIVE_PATH" --clobber
            gh release edit "$TAG_NAME" \
              --title "VS Code Extension v$VERSION" \
              --notes "Packaged VS Code extension build for v$VERSION." \
              "${release_flags[@]}"
          else
            gh release create "$TAG_NAME" "$ARCHIVE_PATH" \
              --title "VS Code Extension v$VERSION" \
              --notes "Packaged VS Code extension build for v$VERSION." \
              "${release_flags[@]}"
          fi

      - name: Report VS Code Marketplace publish failure
        if: steps.vscode_marketplace.outcome == 'failure'
        run: |
          echo "VS Code Marketplace publish failed after the remaining release targets completed." >&2
          exit 1
